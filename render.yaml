databases:
  - name: darkwavestudios-db
    plan: free
    databaseName: darkwavestudios
    user: darkwavestudios

services:
  - type: web
    name: darkwavestudios
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: APP_DOMAIN
        value: darkwavestudios.io
      - key: DATABASE_URL
        fromDatabase:
          name: darkwavestudios-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ORBIT_API_KEY
        sync: false
      - key: ORBIT_API_SECRET
        sync: false
      - key: ORBIT_ECOSYSTEM_URL
        value: https://orbitstaffing.io/api/ecosystem
      - key: COINBASE_COMMERCE_API_KEY
        sync: false
      - key: COINBASE_COMMERCE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_TOKEN_SECRET
        sync: false
